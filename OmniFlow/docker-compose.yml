# ============================================
# OmniFlow â€” Local Development Stack
# ============================================
# Usage: docker compose up -d
# Boots: PostgreSQL, Redis, NATS, Meilisearch, MinIO, Traefik

services:
  # â”€â”€ PostgreSQL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres:
    image: postgres:16-alpine
    container_name: omniflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omniflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-omniflow_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U omniflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€ Redis â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  redis:
    image: redis:7-alpine
    container_name: omniflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€ NATS (Event Bus) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  nats:
    image: nats:2-alpine
    container_name: omniflow-nats
    restart: unless-stopped
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
    command: [ "--jetstream", "--store_dir=/data", "-m", "8222" ]
    volumes:
      - nats_data:/data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€ Meilisearch â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: omniflow-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-omniflow_meili_master_key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:7700/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€ MinIO (S3-compatible Object Storage) â”€â”€â”€â”€â”€
  minio:
    image: minio/minio:latest
    container_name: omniflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-omniflow_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-omniflow_minio_secret}
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€ Traefik (Reverse Proxy & SSL) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  traefik:
    image: traefik:v3.3
    container_name: omniflow-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # â”€â”€ n8n (Workflow Automation) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: omniflow-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      # Connect to PostgreSQL for n8n data
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-omniflow_dev}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-omniflow}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-omniflow_secret}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy


  # ── Prometheus (Metrics) ─────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: omniflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - prometheus_data:/prometheus

  # ── Grafana (Dashboards) ─────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: omniflow-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

  # ── Loki (Log Aggregation) ───────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: omniflow-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki


  # ── Kong (API Gateway) ───────────────────────
  kong:
    image: kong:3.6
    container_name: omniflow-kong
    restart: unless-stopped
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=postgres
      - KONG_PG_USER=${POSTGRES_USER:-omniflow}
      - KONG_PG_PASSWORD=${POSTGRES_PASSWORD:-omniflow_secret}
      - KONG_PG_DATABASE=${POSTGRES_DB:-omniflow_dev}
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    ports:
      - "8000:8000"   # Proxy
      - "8001:8001"   # Admin API
    depends_on:
      postgres:
        condition: service_healthy

  # ── Unleash (Feature Flags) ──────────────────
  unleash:
    image: unleashorg/unleash-server:latest
    container_name: omniflow-unleash
    restart: unless-stopped
    ports:
      - "4242:4242"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-omniflow}:${POSTGRES_PASSWORD:-omniflow_secret}@postgres:5432/${POSTGRES_DB:-omniflow_dev}?schema=public
      - DATABASE_SSL=false
      - LOG_LEVEL=warn
      - UNLEASH_URL=http://localhost:4242
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nats_data:
  meili_data:
  minio_data:
  n8n_data:


  prometheus_data:
  grafana_data:
  loki_data:
